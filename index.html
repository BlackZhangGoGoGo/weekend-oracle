<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1a1039" />
<title>周末好玩屋 ✨ · 选个入口开始你的周末</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="stars"></div>

  <main class="app home-app">
    <header class="hero home-hero">
      <div class="home-logo" aria-hidden="true">✨🎈</div>
      <h1 class="title">周末好玩屋</h1>
      <p class="subtitle">四个魔法入口 · 让你的周末有玩、有娃乐、有饭香、有片看</p>
    </header>

    <section class="home-entries">
      <!-- 入口 1：周末占卜 -->
      <a href="./oracle.html" class="home-entry-card oracle" aria-label="进入周末活动占卜屋">
        <div class="home-entry-emoji">🔮</div>
        <div class="home-entry-text">
          <div class="home-entry-title">活动占卜</div>
          <div class="home-entry-sub">星座 × 年龄 × 数字<br/>召唤一场属于你的有趣冒险</div>
          <div class="home-entry-tags">
            <span class="home-tag">✨ 魔法占卜</span>
            <span class="home-tag">🎯 智能推荐</span>
            <span class="home-tag">📚 活动库</span>
          </div>
        </div>
        <div class="home-entry-arrow">›</div>
      </a>

      <!-- 入口 2：遛娃神器 -->
      <a href="./kids.html" class="home-entry-card kids" aria-label="进入遛娃神器">
        <div class="home-entry-emoji">🧸</div>
        <div class="home-entry-text">
          <div class="home-entry-title">遛娃神器</div>
          <div class="home-entry-sub">告诉我娃的情况<br/>给你一份周末出行锦囊</div>
          <div class="home-entry-tags">
            <span class="home-tag">🏙️ 按城市</span>
            <span class="home-tag">👶 按年龄</span>
            <span class="home-tag">🚗 按出行方式</span>
          </div>
        </div>
        <div class="home-entry-arrow">›</div>
      </a>

      <!-- 入口 3：周末厨神 -->
      <a href="./chef.html" class="home-entry-card chef" aria-label="进入周末厨神">
        <div class="home-entry-emoji">🍳</div>
        <div class="home-entry-text">
          <div class="home-entry-title">周末厨神</div>
          <div class="home-entry-sub">告诉我你的家乡、口味和厨房<br/>给你挑一桌好看又上手的快手菜</div>
          <div class="home-entry-tags">
            <span class="home-tag">🏠 按家乡</span>
            <span class="home-tag">👅 按口味</span>
            <span class="home-tag">🔪 按厨房</span>
          </div>
        </div>
        <div class="home-entry-arrow">›</div>
      </a>

      <!-- 入口 4：看个电影 -->
      <a href="./movie.html" class="home-entry-card movie" aria-label="进入看个电影">
        <div class="home-entry-emoji">🎬</div>
        <div class="home-entry-text">
          <div class="home-entry-title">看个电影</div>
          <div class="home-entry-sub">告诉我心情、天气、几个人<br/>给你挑一部刚刚好的片子</div>
          <div class="home-entry-tags">
            <span class="home-tag">🎭 按心情</span>
            <span class="home-tag">⏱ 按时长</span>
            <span class="home-tag">⭐ 推荐指数</span>
          </div>
        </div>
        <div class="home-entry-arrow">›</div>
      </a>
    </section>

    <footer class="home-footer">
      <p>选个入口，把周末安排得明明白白 ✨</p>
    </footer>
  </main>
</body>
</html>
